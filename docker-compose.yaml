services:

  db:
    image: postgres:18-alpine
    container_name: hesse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME ist nicht gesetzt}
      POSTGRES_USER: ${DB_USER:?DB_USER ist nicht gesetzt}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD ist nicht gesetzt}
    volumes:
      - hesse-db-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build: .
    container_name: hesse-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - hesse-media:/app/seitik/media
      - hesse-static:/app/seitik/staticfiles
    ports:
      - "${WEB_BIND_IP:-127.0.0.1}:${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  hesse-db-data:
  hesse-media:
  hesse-static: